name: Update market signals

on:
  schedule:
    # 20:00 UTC == 04:00 台北 (UTC+8)
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read

# Avoid overlapping runs racing on the same file.
concurrency:
  group: market-signals
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch market signals
        run: node scripts/fetch-market-signals.mjs
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Append signal history
        run: node scripts/append-history.mjs

      - name: Fetch supplementary sources (Taiwan flows, sentiment)
        run: node scripts/fetch-extras.mjs

      - name: Generate AI commentary (GitHub Models — free, built-in token)
        run: node scripts/generate-commentary.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/market_signals.json src/data/signals_history.json \
                  src/data/taiwan_flows.json src/data/sentiment.json \
                  src/data/commentary.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update market data ($(date -u +%Y-%m-%d))"
            git push
          fi
